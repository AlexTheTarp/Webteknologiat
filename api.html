<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers API</title>
    <link rel="stylesheet" href="css/common.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <style>
        .loader { display: none; width: 60px; margin: 20px auto; }
    </style>
</head>
<body class="bg-light p-4">

<div class="container" style="max-width: 900px;">
    <h2 class="text-center mb-4">Numbers API</h2>
    <p class="text-center text-muted">Hae mielenkiintoista tietoa numerosta</p>

    <div class="text-center mb-4">
        <button onclick="haeFakta()" class="btn btn-primary btn-lg">Hae satunnainen fakta</button>
    </div>

    <img id="loader" class="loader" src="https://i.gifer.com/ZZ5H.gif" alt="Ladataan...">

    <div id="tulos" class="text-center"></div>

    <h4 class="mt-5">Bootstrap Accordion</h4>
    <div id="bootstrapAccordion" class="accordion mb-5"></div>

    <h4>jQuery UI Accordion</h4>
    <div id="jqueryAccordion"></div>
</div>

<script>
let counter = 0;

async function haeFakta() {
    document.getElementById("loader").style.display = "block";
    document.getElementById("tulos").innerHTML = "";

    try {
        const res = await fetch('https://api.allorigins.win/raw?url=' + 
            encodeURIComponent('https://numbersapi.com/random?json'));
        
        const data = await res.json();
        counter++;

        document.getElementById("tulos").innerHTML = `
            <div class="alert alert-success">
                <strong>${data.number}</strong>: ${data.text}
            </div>`;

        const bsItem = `
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button ${counter === 1 ? '' : 'collapsed'}" 
                            type="button" data-bs-toggle="collapse" data-bs-target="#collapse${counter}">
                        Fakta #${counter} — ${data.number}
                    </button>
                </h2>
                <div id="collapse${counter}" class="accordion-collapse collapse ${counter === 1 ? 'show' : ''}">
                    <div class="accordion-body">${data.text}</div>
                </div>
            </div>`;
        document.getElementById("bootstrapAccordion").innerHTML += bsItem;

        const jq = $("#jqueryAccordion");
        jq.append(`<h3>Fakta #${counter} — ${data.number}</h3><div><p>${data.text}</p></div>`);
        jq.accordion("refresh");

    } catch (e) {
        document.getElementById("tulos").innerHTML = `
            <div class="alert alert-danger">Virhe haussa. Kokeile uudelleen.</div>`;
    } finally {
        document.getElementById("loader").style.display = "none";
    }
}

$(function() {
    $("#jqueryAccordion").accordion({
        collapsible: true,
        heightStyle: "content"
    });
});
</script>

</body>
</html>
