<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers API</title>
    <link rel="stylesheet" href="css/common.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        .loader {
            display: none;
            margin: 20px auto;
        }
        .accordion {
            max-width: 800px;
            margin: 30px auto;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">Numbers API</h1>
    <p class="text-center text-muted">Hae mielenkiintoista tietoa numerosta</p>

    <div class="text-center mb-4">
        <button onclick="haeSatunnainenNumero()" class="btn btn-primary btn-lg">
            Hae satunnainen fakta
        </button>
    </div>

    <div id="loader" class="loader">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">Ladataan tietoa...</p>
    </div>

    <div id="tulos" class="text-center"></div>

    <div class="accordion mt-5" id="factAccordion"></div>
</div>

<script>
let hakuLaskuri = 0;

async function haeSatunnainenNumero() {
    const loader = document.getElementById('loader');
    const tulosDiv = document.getElementById('tulos');
    const accordion = document.getElementById('factAccordion');

    loader.style.display = 'block';
    tulosDiv.innerHTML = '';

    try {
        const response = await fetch('http://numbersapi.com/random?json');
        const data = await response.json();

        hakuLaskuri++;

        tulosDiv.innerHTML = `
            <div class="alert alert-success">
                <strong>${data.number}</strong>: ${data.text}
            </div>
        `;

        const newItem = `
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button ${hakuLaskuri === 1 ? '' : 'collapsed'}" 
                            type="button" data-bs-toggle="collapse" 
                            data-bs-target="#fact${hakuLaskuri}">
                        ${hakuLaskuri}. haku — ${data.number}
                    </button>
                </h2>
                <div id="fact${hakuLaskuri}" class="accordion-collapse collapse ${hakuLaskuri === 1 ? 'show' : ''}">
                    <div class="accordion-body">
                        ${data.text}
                    </div>
                </div>
            </div>
        `;
        accordion.innerHTML += newItem;

    } catch (error) {
        tulosDiv.innerHTML = `<div class="alert alert-danger">Virhe haussa. Kokeile uudelleen.</div>`;
    } finally {
        loader.style.display = 'none';
    }
}

window.onload = () => {
    haeSatunnainenNumero();
};
</script>

</body>
</html>
