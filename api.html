<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers API - Accordion</title>
    <link rel="stylesheet" href="css/common.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <style>
        .loader { display: none; margin: 30px auto; }
        .section { margin-top: 60px; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 800px;">
        <div class="card-body p-5">
            <h1 class="text-center mb-4">Numbers API</h1>
            <p class="text-center text-muted">Hae mielenkiintoista tietoa numerosta</p>

            <div class="text-center mb-4">
                <button onclick="haeFakta()" class="btn btn-primary btn-lg px-5">
                    Hae satunnainen fakta
                </button>
            </div>

            <div id="loader" class="loader">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Ladataan tietoa...</p>
            </div>

            <div id="tulos" class="text-center"></div>

            <div class="section">
                <h3 class="text-center mb-3">Bootstrap Accordion</h3>
                <div id="bootstrapAccordion" class="accordion"></div>
            </div>

            <div class="section">
                <h3 class="text-center mb-3">jQuery UI Accordion</h3>
                <div id="jqueryAccordion"></div>
            </div>
        </div>
    </div>
</div>

<script>
let hakuLaskuri = 0;

async function haeFakta() {
    const loader = document.getElementById('loader');
    const tulosDiv = document.getElementById('tulos');

    loader.style.display = 'block';
    tulosDiv.innerHTML = '';

    try {
        const response = await fetch('https://numbersapi.com/random?json');
        const data = await response.json();
        
        hakuLaskuri++;

        tulosDiv.innerHTML = `
            <div class="alert alert-success fs-5">
                <strong>${data.number}</strong>: ${data.text}
            </div>
        `;

        lisaaBootstrapAccordion(data.number, data.text);

        lisaaJqueryAccordion(data.number, data.text);

    } catch (error) {
        tulosDiv.innerHTML = `<div class="alert alert-danger">Virhe haussa. Kokeile uudelleen.</div>`;
    } finally {
        loader.style.display = 'none';
    }
}

function lisaaBootstrapAccordion(number, text) {
    const acc = document.getElementById('bootstrapAccordion');
    const item = `
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button ${hakuLaskuri === 1 ? '' : 'collapsed'}" 
                        type="button" data-bs-toggle="collapse" 
                        data-bs-target="#bs${hakuLaskuri}">
                    ${hakuLaskuri}. haku — ${number}
                </button>
            </h2>
            <div id="bs${hakuLaskuri}" class="accordion-collapse collapse ${hakuLaskuri === 1 ? 'show' : ''}">
                <div class="accordion-body">${text}</div>
            </div>
        </div>`;
    acc.innerHTML += item;
}

function lisaaJqueryAccordion(number, text) {
    const container = $("#jqueryAccordion");
    
    const newItem = $(`
        <h3>${hakuLaskuri}. haku — ${number}</h3>
        <div><p>${text}</p></div>
    `);
    
    container.append(newItem);
    container.accordion("refresh"); 
}

$(function() {
    $("#jqueryAccordion").accordion({
        collapsible: true,
        heightStyle: "content"
    });
});
</script>

</body>
</html>
