<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers API</title>
    <link rel="stylesheet" href="css/common.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <style>
        .loader { display: none; margin: 30px auto; }
        .alert { margin: 20px 0; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 800px;">
        <div class="card-body p-5 text-center">
            <h1 class="mb-4">Numbers API</h1>
            <p class="text-muted mb-4">Hae mielenkiintoista tietoa numerosta</p>

            <button onclick="haeFakta()" class="btn btn-primary btn-lg px-5 mb-4">
                Hae satunnainen fakta
            </button>

            <div id="loader" class="loader">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Ladataan tietoa...</p>
            </div>

            <div id="tulos"></div>

            <div class="mt-5">
                <h3>Bootstrap Accordion</h3>
                <div id="bootstrapAcc" class="accordion mt-3"></div>
            </div>

            <div class="mt-5">
                <h3>jQuery UI Accordion</h3>
                <div id="jqueryAcc" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
let hakuLaskuri = 0;

async function haeFakta() {
    const loader = document.getElementById('loader');
    const tulosDiv = document.getElementById('tulos');
    
    loader.style.display = 'block';
    tulosDiv.innerHTML = '';

    try {
        const proxy = "https://api.allorigins.win/raw?url=";
        const url = encodeURIComponent("http://numbersapi.com/random?json");
        
        const response = await fetch(proxy + url);
        const data = await response.json();

        hakuLaskuri++;

        tulosDiv.innerHTML = `
            <div class="alert alert-success fs-5">
                <strong>${data.number}</strong>: ${data.text}
            </div>
        `;

        const bsHTML = `
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button ${hakuLaskuri === 1 ? '' : 'collapsed'}" 
                            type="button" data-bs-toggle="collapse" data-bs-target="#bs${hakuLaskuri}">
                        ${hakuLaskuri}. haku — ${data.number}
                    </button>
                </h2>
                <div id="bs${hakuLaskuri}" class="accordion-collapse collapse ${hakuLaskuri === 1 ? 'show' : ''}">
                    <div class="accordion-body">${data.text}</div>
                </div>
            </div>`;
        document.getElementById('bootstrapAcc').innerHTML += bsHTML;

        const jq = $("#jqueryAcc");
        jq.append(`<h3>${hakuLaskuri}. haku — ${data.number}</h3><div><p>${data.text}</p></div>`);
        jq.accordion("refresh");

    } catch (err) {
        tulosDiv.innerHTML = `
            <div class="alert alert-danger">
                Virhe haussa. Kokeile uudelleen.
            </div>`;
        console.error(err);
    } finally {
        loader.style.display = 'none';
    }
}

$(function() {
    $("#jqueryAcc").accordion({
        collapsible: true,
        heightStyle: "content"
    });
});
</script>

</body>
</html>
