<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuck Norris Facts</title>
    <link rel="stylesheet" href="css/common.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <style>
        .loader { display: none; width: 60px; margin: 20px auto; }
        .fact-text { font-size: 1.1em; }
    </style>
</head>
<body class="bg-light p-4">

<div class="container" style="max-width: 900px;">
    <h2 class="text-center mb-4">Chuck Norris Facts</h2>
    <p class="text-center text-muted">Hae satunnainen Chuck Norris -fakta</p>

    <div class="text-center mb-4">
        <button onclick="haeFakta()" class="btn btn-danger btn-lg">Hae uusi fakta</button>
    </div>

    <img id="loader" class="loader" src="https://i.gifer.com/ZZ5H.gif" alt="Ladataan...">

    <div id="tulos" class="text-center"></div>

    <h4 class="mt-5">Bootstrap Accordion</h4>
    <div id="bootstrapAcc" class="accordion mb-5"></div>

    <h4>jQuery UI Accordion</h4>
    <div id="jqueryAcc" class="mt-3"></div>
</div>

<script>
let counter = 0;

async function haeFakta() {
    document.getElementById("loader").style.display = "block";
    document.getElementById("tulos").innerHTML = "";

    try {
        const response = await fetch('https://api.chucknorris.io/jokes/random');
        const data = await response.json();

        counter++;

        document.getElementById("tulos").innerHTML = `
            <div class="alert alert-warning fact-text">
                ${data.value}
            </div>`;

        const bsHTML = `
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button ${counter===1 ? '' : 'collapsed'}" 
                            type="button" data-bs-toggle="collapse" data-bs-target="#bs${counter}">
                        Fakta #${counter}
                    </button>
                </h2>
                <div id="bs${counter}" class="accordion-collapse collapse ${counter===1 ? 'show' : ''}">
                    <div class="accordion-body">${data.value}</div>
                </div>
            </div>`;
        document.getElementById("bootstrapAcc").innerHTML += bsHTML;

        const jq = $("#jqueryAcc");
        jq.append(`<h3>Fakta #${counter}</h3><div><p>${data.value}</p></div>`);
        jq.accordion("refresh");

    } catch (err) {
        document.getElementById("tulos").innerHTML = `
            <div class="alert alert-danger">Virhe haussa. Kokeile uudelleen.</div>`;
    } finally {
        document.getElementById("loader").style.display = "none";
    }
}

$(function() {
    $("#jqueryAcc").accordion({
        collapsible: true,
        heightStyle: "content"
    });
});
</script>

</body>
</html>
