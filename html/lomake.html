<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ota yhteyttä</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="lomake.css">
</head>
<body>

<div class="container">
  <h1>Ota yhteyttä</h1>

  <form>
    <fieldset>
      <legend>Contact information:</legend>

      <div class="form-row">
        <label for="first-name">Etunimi</label>
        <input type="text" id="first-name" name="first-name" required>
      </div>

      <div class="form-row">
        <label for="last-name">Sukunimi</label>
        <input type="text" id="last-name" name="last-name" required>
      </div>

      <div class="form-row">
        <label for="email">Sähköposti</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-row">
        <label for="telephone">Puhelin</label>
        <input type="tel" id="telephone" name="telephone">
      </div>

      <div class="checkbox-group">
        <p>Ensisijainen yhteydenottotapa:</p>
        <label><input type="checkbox" name="preferred-contact" value="email"> Sähköposti</label>
        <label><input type="checkbox" name="preferred-contact" value="telephone"> Puhelin</label>
      </div><div class="grid contact-grid">
        <div class="label"><label for="fname">First name:</label></div>
        <div class="input"><input type="text" id="fname" name="fname" /></div>
        <div class="side-title">Preferred contact method:</div>

        <div class="label"><label for="lname">Last name:</label></div>
        <div class="input"><input type="text" id="lname" name="lname" /></div>
        <div class="side-input">
          <label><input type="checkbox" name="preferred" value="email" /> Email</label>
        </div>

        <div class="label"><label for="email_input">Email:</label></div>
        <div class="input"><input type="email" id="email_input" name="email" /></div>
        <div class="side-input">
          <label><input type="checkbox" name="preferred" value="telephone" /> Telephone</label>
        </div>

        <div class="label"><label for="telephone_input">Telephone:</label></div>
        <div class="input"><input type="tel" id="telephone_input" name="telephone" /></div>
        <div class="side-empty"></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Feedback:</legend>

      <div class="grid feedback-grid">
        <div class="field span-2">
          <label for="subject">Message subject:</label>
          <input type="text" id="subject" name="subject" />
        </div>

        <div class="field span-2">
          <label for="message">Message:</label>
          <textarea id="message" name="message" rows="10" placeholder="Kirjoita viesti tähän..."></textarea>
        </div>

        <div class="field file-row">
          <label for="file">Attach a file:</label>
          <input type="file" id="file" name="file" />
        </div>

        <div class="actions">
          <input type="submit" value="Send" class="submit-btn" />
        </div>
      </div>
    </fieldset>
  </form>
</div>

</body>
</html>
