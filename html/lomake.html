<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ota yhteyttä</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="lomake.css">
</head>
<body>

<div class="container">
  <h1>Ota yhteyttä</h1>

  <form>
    <fieldset>
      <legend>Yhteystiedot</legend>

      <div class="form-row">
        <label for="first-name">Etunimi</label>
        <input type="text" id="first-name" name="first-name" required>
      </div>

      <div class="form-row">
        <label for="last-name">Sukunimi</label>
        <input type="text" id="last-name" name="last-name" required>
      </div>

      <div class="form-row">
        <label for="email">Sähköposti</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-row">
        <label for="telephone">Puhelin</label>
        <input type="tel" id="telephone" name="telephone">
      </div>

      <div class="checkbox-group">
        <p>Ensisijainen yhteydenottotapa:</p>
        <label><input type="checkbox" name="preferred-contact" value="email"> Sähköposti</label>
        <label><input type="checkbox" name="preferred-contact" value="telephone"> Puhelin</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Palaute / Viesti</legend>

      <div class="form-row">
        <label for="subject">Aihe</label>
        <input type="text" id="subject" name="subject">
      </div>

      <div class="form-row">
        <label for="message">Viesti</label>
        <textarea id="message" name="message" rows="6"></textarea>
      </div>

      <div class="form-row">
        <label for="file">Liitetiedosto (valinnainen)</label>
        <input type="file" id="file" name="file">
      </div>

      <button type="submit">Lähetä</button>
    </fieldset>
  </form>
</div>

</body>
</html>
