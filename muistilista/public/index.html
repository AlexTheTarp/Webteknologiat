<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muistilista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4">📋 Oma Muistilista</h1>

    <button onclick="loadAllTasks()" class="btn btn-primary mb-3">Lataa kaikki tehtävät</button>

    <div class="row">
        <div class="col-md-6">
            <h4>Kaikki tehtävät</h4>
            <ul id="taskList" class="list-group"></ul>
        </div>

        <div class="col-md-6">
            <h4>Valittu tehtävä</h4>
            <div id="singleTask" class="card p-3"></div>
        </div>
    </div>
</div>

<script>
async function loadAllTasks() {
    const res = await fetch('http://localhost:3000/tasks');
    const tasks = await res.json();
    
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `list-group-item ${task.complete ? 'list-group-item-success' : ''}`;
        li.innerHTML = `
            <strong>${task.title}</strong><br>
            <small>${task.description}</small>
            <button onclick="loadSingleTask(${task.id})" class="btn btn-sm btn-outline-primary float-end">Näytä</button>
        `;
        list.appendChild(li);
    });
}

async function loadSingleTask(id) {
    const res = await fetch(`http://localhost:3000/task/${id}`);
    const task = await res.json();
    
    document.getElementById('singleTask').innerHTML = `
        <h5>${task.title}</h5>
        <p>${task.description}</p>
        <p><strong>Tila:</strong> 
            ${task.complete ? '✅ Valmis' : task.cancelled ? '❌ Peruutettu' : '⏳ Kesken'}
        </p>
        <small>${new Date(task.date).toLocaleString('fi-FI')}</small>
    `;
}
</script>
</body>
</html>
