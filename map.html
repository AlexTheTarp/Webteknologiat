<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartta</title>
    <link rel="stylesheet" href="css/common.css">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .search-box {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .search-box label {
            margin: 0 10px 5px 0;
            display: inline-block;
            width: 120px;
            text-align: right;
        }
        .search-box input[type="text"] {
            width: 280px;
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .search-box button {
            padding: 12px 30px;
            margin-left: 15px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .search-box button:hover {
            background-color: #3367d6;
        }
        #mapFrame {
            width: 100%;
            height: 600px;
            border: 2px solid #ccc;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kartta</h1>

    <div class="search-box">
        <label for="address">Katuosoite:</label>
        <input type="text" id="address" placeholder="esim. Yliopistonkatu 36" value="Yliopistonkatu 36">

        <label for="city">Kaupunki:</label>
        <input type="text" id="city" placeholder="esim. Lappeenranta" value="Lappeenranta">

        <button onclick="haeKartta()">Hae</button>
    </div>

    <iframe 
        id="mapFrame"
        width="100%" 
        height="600" 
        frameborder="0" 
        style="border:0"
        allowfullscreen
        loading="lazy">
    </iframe>
</div>

<script>
const oletusOsoite = "Yliopistonkatu 36";
const oletusKaupunki = "Lappeenranta";

function paivitaKartta(address, city) {
    const query = encodeURIComponent(address + ", " + city);
    const mapUrl = `https://www.google.com/maps?q=${query}&output=embed`;
    
    document.getElementById("mapFrame").src = mapUrl;
}

window.onload = function() {
    paivitaKartta(oletusOsoite, oletusKaupunki);
};

function haeKartta() {
    const address = document.getElementById("address").value.trim();
    const city = document.getElementById("city").value.trim();

    if (address === "" || city === "") {
        alert("Syötä sekä katuosoite että kaupunki!");
        return;
    }

    paivitaKartta(address, city);
}
</script>

</body>
</html>
