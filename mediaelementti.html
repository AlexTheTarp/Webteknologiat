<!DOCTYPE html>
<html lang="fi">
    </head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediaelementti</title>
    <link rel="stylesheet" href="css/common.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        .mediaelementti {
            width: 60%;
            margin: 40px auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
        }
        .karuselli img {
            width: 100%;
            max-height: 420px;
            object-fit: cover;
            border-radius: 8px;
            transition: opacity 0.6s ease;
        }
        .karuselli h2 {
            margin: 15px 0 8px 0;
        }
        .karuselli p {
            font-size: 1.1em;
            color: #555;
            min-height: 50px;
        }
        .btn-group button {
            font-size: 1.4em;
            padding: 10px 18px;
            margin: 0 8px;
        }
        .btn-play {
            background-color: #28a745;
            color: white;
        }
        .btn-play:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="karuselli">
    <h2>Mielenkiintoisia kuvia elämästä</h2>
    
    <img id="kuva" src="" alt="Karusellin kuva">
    
    <h2 id="otsikko"></h2>
    <p id="teksti"></p>

    <div class="btn-group" role="group">
        <button onclick="edellinen()" class="btn btn-outline-primary">
            <i class="bi bi-arrow-left-circle"></i> Edellinen
        </button>
        
        <button id="playBtn" onclick="togglePlay()" class="btn btn-play">
            <i class="bi bi-play-circle"></i> Toista
        </button>
        
        <button onclick="seuraava()" class="btn btn-outline-primary">
            Seuraava <i class="bi bi-arrow-right-circle"></i>
        </button>
    </div>
</div>
<script>
const sisalto = [
    {
        title: "Vuorinäkymä",
        content: "Vuoristo ja kirkkaan sininen joki.",
        image: "https://picsum.photos/id/1015/800/500"
    },
    {
        title: "Työhuone",
        content: "Toimiston työkalut.",
        image: "https://picsum.photos/id/201/800/500"
    },
    {
        title: "Koiranpentu",
        content: "Koiranpentu.",
        image: "https://picsum.photos/id/237/800/500"
    },
    {
        title: "Metsäinen polku",
        content: "Sumuinen maisema retkeilijän näkökulmasta.",
        image: "https://picsum.photos/id/669/800/500"
    }
];

let nykyinenIndex = 0;
let intervalId = null;
let onPaalla = false;

function naytaSisalto(index) {
    if (index < 0) index = sisalto.length - 1;
    if (index >= sisalto.length) index = 0;

    nykyinenIndex = index;

    localStorage.setItem('karuselliIndex', nykyinenIndex);

    const item = sisalto[index];

    // jQuery fade-out + fade-in efekti
    $("#kuva").fadeOut(400, function() {
        $(this).attr("src", item.image).fadeIn(600);
    });

    $("#otsikko").fadeOut(300, function() {
        $(this).text(item.title).fadeIn(400);
    });

    $("#teksti").fadeOut(300, function() {
        $(this).text(item.content).fadeIn(400);
    });
}

function seuraava() {
    naytaSisalto(nykyinenIndex + 1);
}

function edellinen() {
    naytaSisalto(nykyinenIndex - 1);
}

function togglePlay() {
    const btn = document.getElementById("playBtn");
    
    if (onPaalla) {
        clearInterval(intervalId);
        onPaalla = false;
        btn.innerHTML = `<i class="bi bi-play-circle"></i> Toista`;
    } else {
        intervalId = setInterval(() => {
            seuraava();
        }, 4000); 
        
        onPaalla = true;
        btn.innerHTML = `<i class="bi bi-pause-circle"></i> Pysäytä`;
    }
}

window.onload = function() {
    const tallennettu = localStorage.getItem('karuselliIndex');
    if (tallennettu !== null) {
        nykyinenIndex = parseInt(tallennettu);
    }

    naytaSisalto(nykyinenIndex);
};
</script>

</body>
</html>
