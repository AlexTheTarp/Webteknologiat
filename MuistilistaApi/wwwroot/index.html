<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muistilista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 1000px;">
        <h1 class="text-center mb-4">📋 Oma Muistilista</h1>

        <div class="text-center mb-4">
            <button onclick="loadAllTasks()" class="btn btn-primary btn-lg">Lataa kaikki tehtävät</button>
        </div>

        <div class="row">
            <div class="col-md-6">
                <h4>Kaikki tehtävät</h4>
                <ul id="taskList" class="list-group"></ul>
            </div>

            <div class="col-md-6">
                <h4>Valittu tehtävä</h4>
                <div id="singleTask" class="card p-4"></div>
            </div>
        </div>
    </div>

<script>
async function loadAllTasks() {
    const res = await fetch('http://localhost:5030/tasks');
    const tasks = await res.json();
    
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `list-group-item list-group-item-action ${task.Complete ? 'list-group-item-success' : ''}`;
        li.innerHTML = `
            <strong>${task.Title}</strong><br>
            <small>${task.Description}</small>
            <button onclick="loadSingleTask(${task.Id})" class="btn btn-sm btn-outline-primary float-end mt-1">Näytä</button>
        `;
        list.appendChild(li);
    });
}

async function loadSingleTask(id) {
    const res = await fetch(`http://localhost:5030/task/${id}`);
    const task = await res.json();
    
    document.getElementById('singleTask').innerHTML = `
        <h5>${task.Title}</h5>
        <p>${task.Description}</p>
        <p><strong>Tila:</strong> 
            ${task.Complete ? '✅ Valmis' : task.Cancelled ? '❌ Peruutettu' : '⏳ Kesken'}
        </p>
        <small>${new Date(task.Date).toLocaleString('fi-FI')}</small>
    `;
}
</script>
</body>
</html>
